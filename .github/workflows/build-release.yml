name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_windows_x64:
        description: 'Build Windows x64'
        type: boolean
        default: true
      build_windows_x86:
        description: 'Build Windows x86'
        type: boolean
        default: false
      build_windows_arm64:
        description: 'Build Windows ARM64'
        type: boolean
        default: true
      build_macos_x64:
        description: 'Build macOS x64 (Intel)'
        type: boolean
        default: false
      build_macos_arm64:
        description: 'Build macOS ARM64 (Apple Silicon)'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  # ========================================================================
  # Create/ensure the release exists before any build job uploads to it.
  # Running 5 build jobs in parallel that each try to *create* the same
  # release (especially the floating "latest" tag on workflow_dispatch) is a
  # race condition — two jobs can hit the GitHub API at the same moment and
  # one will fail. Creating the release once, up front, and having every
  # build job depend on it via `needs` removes that race. Concurrent asset
  # *uploads* to an already-existing release are fine.
  # ========================================================================
  create-release:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Ensure release exists
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          make_latest: ${{ startsWith(github.ref, 'refs/tags/') }}

  # ========================================================================
  # Windows x64
  # ========================================================================
  build-windows-x64:
    needs: create-release
    if: |
      always() &&
      (needs.create-release.result == 'success' || needs.create-release.result == 'skipped') &&
      (github.event_name == 'push' || inputs.build_windows_x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Install Python deps
        run: pip install -r requirements.txt pyinstaller

      - name: Download FFmpeg (x64)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath .
          $dir = Get-ChildItem -Directory -Filter "ffmpeg-*" | Select-Object -First 1
          if (-not $dir) { throw "FFmpeg archive did not contain an ffmpeg-* directory; download or archive layout may have changed." }
          Rename-Item $dir.Name ffmpeg_bundle
          Remove-Item ffmpeg.zip
          if (-not (Get-ChildItem -Recurse ffmpeg_bundle -Filter ffmpeg.exe -ErrorAction SilentlyContinue)) { throw "ffmpeg.exe not found after extraction." }

      - name: Download Node.js (x64)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -Uri "https://nodejs.org/dist/v20.18.0/node-v20.18.0-win-x64.zip" -OutFile node.zip
          Expand-Archive node.zip -DestinationPath .
          $dir = Get-ChildItem -Directory -Filter "node-v*" | Select-Object -First 1
          if (-not $dir) { throw "Node.js archive did not contain a node-v* directory; download or archive layout may have changed." }
          Rename-Item $dir.Name node
          Remove-Item node.zip
          if (-not (Test-Path "node/node.exe")) { throw "node.exe not found after extraction." }

      - name: PyInstaller build
        run: pyinstaller DouyinLiveRecorder.spec

      - name: Assemble package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $dist = "dist/DouyinLiveRecorder"
          if (-not (Test-Path $dist)) { throw "PyInstaller output '$dist' not found; build may have failed." }

          # ffmpeg — copy to ffmpeg/ directory (added to PATH at runtime)
          $ffmpegExe = Get-ChildItem -Recurse ffmpeg_bundle -Filter ffmpeg.exe | Select-Object -First 1
          if (-not $ffmpegExe) { throw "ffmpeg.exe not found in ffmpeg_bundle." }
          New-Item -Force -ItemType Directory "$dist/ffmpeg" | Out-Null
          Copy-Item $ffmpegExe.FullName "$dist/ffmpeg/ffmpeg.exe"

          # node — node/ dir (src/__init__.py adds ./node/ to PATH)
          # Not silenced: a partial/failed copy here would ship a package that
          # can't run any bundled JS, so this must fail the build loudly.
          Copy-Item -Recurse node/* "$dist/node/" -Force
          if (-not (Test-Path "$dist/node/node.exe")) { throw "node.exe missing from assembled package." }

          # Default config
          New-Item -Force -ItemType Directory "$dist/config", "$dist/logs" | Out-Null
          Copy-Item config/config.ini "$dist/config/config.ini" -ErrorAction SilentlyContinue
          "" | Out-File -FilePath "$dist/config/URL_config.ini" -Encoding utf8

          # Also copy StopRecording.vbs (upstream includes it)
          Copy-Item StopRecording.vbs "$dist/" -ErrorAction SilentlyContinue

          # Package
          Compress-Archive -Path "$dist/*" -DestinationPath DouyinLiveRecorder_Windows_x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: DouyinLiveRecorder_Windows_x64
          path: DouyinLiveRecorder_Windows_x64.zip

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: DouyinLiveRecorder_Windows_x64.zip
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}

  # ========================================================================
  # Windows x86 (32-bit)
  # ========================================================================
  build-windows-x86:
    needs: create-release
    if: |
      always() &&
      (needs.create-release.result == 'success' || needs.create-release.result == 'skipped') &&
      (github.event_name == 'push' || inputs.build_windows_x86)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x86'

      - name: Install Python deps
        run: pip install -r requirements.txt pyinstaller

      - name: Download FFmpeg (x86)
        shell: pwsh
        run: |
          # NOTE: gyan.dev and BtbN no longer publish real 32-bit (i686) FFmpeg builds —
          # "all builds are 64-bit". This still pulls the 64-bit build, so the resulting
          # package will NOT run on genuine 32-bit Windows. It works today only because
          # GitHub's windows-latest runner is itself 64-bit, so pyinstaller's x86 Python
          # can still spawn the 64-bit ffmpeg.exe as a subprocess under WOW64. If you need
          # to support real 32-bit Windows hosts, you'll have to compile ffmpeg yourself.
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath .
          $dir = Get-ChildItem -Directory -Filter "ffmpeg-*" | Select-Object -First 1
          if (-not $dir) { throw "FFmpeg archive did not contain an ffmpeg-* directory; download or archive layout may have changed." }
          Rename-Item $dir.Name ffmpeg_bundle
          Remove-Item ffmpeg.zip
          if (-not (Get-ChildItem -Recurse ffmpeg_bundle -Filter ffmpeg.exe -ErrorAction SilentlyContinue)) { throw "ffmpeg.exe not found after extraction." }

      - name: Download Node.js (x86)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -Uri "https://nodejs.org/dist/v20.18.0/node-v20.18.0-win-x86.zip" -OutFile node.zip
          Expand-Archive node.zip -DestinationPath .
          $dir = Get-ChildItem -Directory -Filter "node-v*" | Select-Object -First 1
          if (-not $dir) { throw "Node.js archive did not contain a node-v* directory; download or archive layout may have changed." }
          Rename-Item $dir.Name node
          Remove-Item node.zip
          if (-not (Test-Path "node/node.exe")) { throw "node.exe not found after extraction." }

      - name: PyInstaller build
        run: pyinstaller DouyinLiveRecorder.spec

      - name: Assemble package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $dist = "dist/DouyinLiveRecorder"
          if (-not (Test-Path $dist)) { throw "PyInstaller output '$dist' not found; build may have failed." }

          $ffmpegExe = Get-ChildItem -Recurse ffmpeg_bundle -Filter ffmpeg.exe | Select-Object -First 1
          if (-not $ffmpegExe) { throw "ffmpeg.exe not found in ffmpeg_bundle." }
          New-Item -Force -ItemType Directory "$dist/ffmpeg" | Out-Null
          Copy-Item $ffmpegExe.FullName "$dist/ffmpeg/ffmpeg.exe"

          Copy-Item -Recurse node/* "$dist/node/" -Force
          if (-not (Test-Path "$dist/node/node.exe")) { throw "node.exe missing from assembled package." }

          New-Item -Force -ItemType Directory "$dist/config", "$dist/logs" | Out-Null
          Copy-Item config/config.ini "$dist/config/config.ini" -ErrorAction SilentlyContinue
          "" | Out-File -FilePath "$dist/config/URL_config.ini" -Encoding utf8

          Copy-Item StopRecording.vbs "$dist/" -ErrorAction SilentlyContinue

          Compress-Archive -Path "$dist/*" -DestinationPath DouyinLiveRecorder_Windows_x86.zip

      - uses: actions/upload-artifact@v4
        with:
          name: DouyinLiveRecorder_Windows_x86
          path: DouyinLiveRecorder_Windows_x86.zip

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: DouyinLiveRecorder_Windows_x86.zip
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}

  # ========================================================================
  # Windows ARM64
  # ========================================================================
  build-windows-arm64:
    needs: create-release
    if: |
      always() &&
      (needs.create-release.result == 'success' || needs.create-release.result == 'skipped') &&
      (github.event_name == 'push' || inputs.build_windows_arm64)
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'arm64'

      - name: Install Python deps
        run: pip install -r requirements.txt pyinstaller

      - name: Download FFmpeg (ARM64, native)
        shell: pwsh
        run: |
          # gyan.dev only ships 64-bit x86 (win64) builds, NOT arm64 — using it here
          # would silently bundle an x64 ffmpeg.exe into the arm64 package. Use BtbN's
          # native winarm64 build instead (the "latest" tag always points at the newest build).
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-winarm64-gpl.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath .
          $dir = Get-ChildItem -Directory -Filter "ffmpeg-*" | Select-Object -First 1
          if (-not $dir) { throw "FFmpeg archive did not contain an ffmpeg-* directory; download or archive layout may have changed." }
          Rename-Item $dir.Name ffmpeg_bundle
          Remove-Item ffmpeg.zip
          if (-not (Get-ChildItem -Recurse ffmpeg_bundle -Filter ffmpeg.exe -ErrorAction SilentlyContinue)) { throw "ffmpeg.exe not found after extraction." }

      - name: Download Node.js (ARM64)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -Uri "https://nodejs.org/dist/v20.18.0/node-v20.18.0-win-arm64.zip" -OutFile node.zip
          Expand-Archive node.zip -DestinationPath .
          $dir = Get-ChildItem -Directory -Filter "node-v*" | Select-Object -First 1
          if (-not $dir) { throw "Node.js archive did not contain a node-v* directory; download or archive layout may have changed." }
          Rename-Item $dir.Name node
          Remove-Item node.zip
          if (-not (Test-Path "node/node.exe")) { throw "node.exe not found after extraction." }

      - name: PyInstaller build
        run: pyinstaller DouyinLiveRecorder.spec

      - name: Assemble package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $dist = "dist/DouyinLiveRecorder"
          if (-not (Test-Path $dist)) { throw "PyInstaller output '$dist' not found; build may have failed." }

          $ffmpegExe = Get-ChildItem -Recurse ffmpeg_bundle -Filter ffmpeg.exe | Select-Object -First 1
          if (-not $ffmpegExe) { throw "ffmpeg.exe not found in ffmpeg_bundle." }
          New-Item -Force -ItemType Directory "$dist/ffmpeg" | Out-Null
          Copy-Item $ffmpegExe.FullName "$dist/ffmpeg/ffmpeg.exe"

          Copy-Item -Recurse node/* "$dist/node/" -Force
          if (-not (Test-Path "$dist/node/node.exe")) { throw "node.exe missing from assembled package." }

          New-Item -Force -ItemType Directory "$dist/config", "$dist/logs" | Out-Null
          Copy-Item config/config.ini "$dist/config/config.ini" -ErrorAction SilentlyContinue
          "" | Out-File -FilePath "$dist/config/URL_config.ini" -Encoding utf8

          Copy-Item StopRecording.vbs "$dist/" -ErrorAction SilentlyContinue

          Compress-Archive -Path "$dist/*" -DestinationPath DouyinLiveRecorder_Windows_arm64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: DouyinLiveRecorder_Windows_arm64
          path: DouyinLiveRecorder_Windows_arm64.zip

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: DouyinLiveRecorder_Windows_arm64.zip
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}

  # ========================================================================
  # macOS x64 (Intel)
  # ========================================================================
  build-macos-x64:
    needs: create-release
    if: |
      always() &&
      (needs.create-release.result == 'success' || needs.create-release.result == 'skipped') &&
      (github.event_name == 'push' || inputs.build_macos_x64)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install -r requirements.txt pyinstaller

      - name: Download static FFmpeg (Intel)
        run: |
          curl -L -o ffmpeg.zip "https://www.osxexperts.net/ffmpeg7intel.zip"
          unzip ffmpeg.zip -d ffmpeg_static
          rm ffmpeg.zip

      - name: Download Node.js (x64)
        run: |
          curl -L -o node.tar.gz "https://nodejs.org/dist/v20.18.0/node-v20.18.0-darwin-x64.tar.gz"
          tar xzf node.tar.gz
          mv node-v20.18.0-darwin-x64 node_static
          rm node.tar.gz

      - name: PyInstaller build
        run: pyinstaller DouyinLiveRecorder.spec

      - name: Assemble package
        run: |
          set -euo pipefail
          dist="dist/DouyinLiveRecorder"
          [ -d "$dist" ] || { echo "PyInstaller output '$dist' not found; build may have failed." >&2; exit 1; }

          # Copy static ffmpeg binary
          mkdir -p "$dist/ffmpeg"
          cp ffmpeg_static/ffmpeg "$dist/ffmpeg/ffmpeg"
          chmod +x "$dist/ffmpeg/ffmpeg"

          # Copy static node binary
          # NOTE: only the bare "node" binary is bundled here, matching the path
          # ("$dist/node/node") that src/__init__.py adds to PATH at runtime.
          # The Windows jobs bundle the *entire* node/ zip contents (which includes
          # npm, npx, and node_modules) at that same relative path. If the app or
          # any bundled JS script ever shells out to `npm`/`npx`, or relies on
          # node's own lib/ files, this macOS build will be missing them — worth
          # confirming whether that gap matters before shipping.
          mkdir -p "$dist/node"
          cp node_static/bin/node "$dist/node/node"
          chmod +x "$dist/node/node"

          # Default config
          mkdir -p "$dist/config" "$dist/logs"
          cp config/config.ini "$dist/config/config.ini" 2>/dev/null || true
          touch "$dist/config/URL_config.ini"

          # Copy macOS launcher script
          cp start_macos.sh "$dist/"
          chmod +x "$dist/start_macos.sh"

          # Remove quarantine attributes (critical for macOS)
          xattr -cr "$dist"

          # Package
          cd dist
          zip -r "$GITHUB_WORKSPACE/DouyinLiveRecorder_macOS_x64.zip" DouyinLiveRecorder/

      - uses: actions/upload-artifact@v4
        with:
          name: DouyinLiveRecorder_macOS_x64
          path: DouyinLiveRecorder_macOS_x64.zip

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: DouyinLiveRecorder_macOS_x64.zip
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}

  # ========================================================================
  # macOS ARM64 (Apple Silicon)
  # ========================================================================
  build-macos-arm64:
    needs: create-release
    if: |
      always() &&
      (needs.create-release.result == 'success' || needs.create-release.result == 'skipped') &&
      (github.event_name == 'push' || inputs.build_macos_arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install -r requirements.txt pyinstaller

      - name: Download static FFmpeg (ARM64)
        run: |
          curl -L -o ffmpeg.zip "https://www.osxexperts.net/ffmpeg7arm.zip"
          unzip ffmpeg.zip -d ffmpeg_static
          rm ffmpeg.zip

      - name: Download Node.js (ARM64)
        run: |
          curl -L -o node.tar.gz "https://nodejs.org/dist/v20.18.0/node-v20.18.0-darwin-arm64.tar.gz"
          tar xzf node.tar.gz
          mv node-v20.18.0-darwin-arm64 node_static
          rm node.tar.gz

      - name: PyInstaller build
        run: pyinstaller DouyinLiveRecorder.spec

      - name: Assemble package
        run: |
          set -euo pipefail
          dist="dist/DouyinLiveRecorder"
          [ -d "$dist" ] || { echo "PyInstaller output '$dist' not found; build may have failed." >&2; exit 1; }

          # Copy static ffmpeg binary
          mkdir -p "$dist/ffmpeg"
          cp ffmpeg_static/ffmpeg "$dist/ffmpeg/ffmpeg"
          chmod +x "$dist/ffmpeg/ffmpeg"

          # Copy static node binary
          # NOTE: only the bare "node" binary is bundled here, matching the path
          # ("$dist/node/node") that src/__init__.py adds to PATH at runtime.
          # The Windows jobs bundle the *entire* node/ zip contents (which includes
          # npm, npx, and node_modules) at that same relative path. If the app or
          # any bundled JS script ever shells out to `npm`/`npx`, or relies on
          # node's own lib/ files, this macOS build will be missing them — worth
          # confirming whether that gap matters before shipping.
          mkdir -p "$dist/node"
          cp node_static/bin/node "$dist/node/node"
          chmod +x "$dist/node/node"

          # Default config
          mkdir -p "$dist/config" "$dist/logs"
          cp config/config.ini "$dist/config/config.ini" 2>/dev/null || true
          touch "$dist/config/URL_config.ini"

          # Copy macOS launcher script
          cp start_macos.sh "$dist/"
          chmod +x "$dist/start_macos.sh"

          # Remove quarantine attributes (critical for macOS)
          xattr -cr "$dist"

          # Package
          cd dist
          zip -r "$GITHUB_WORKSPACE/DouyinLiveRecorder_macOS_arm64.zip" DouyinLiveRecorder/

      - uses: actions/upload-artifact@v4
        with:
          name: DouyinLiveRecorder_macOS_arm64
          path: DouyinLiveRecorder_macOS_arm64.zip

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: DouyinLiveRecorder_macOS_arm64.zip
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}