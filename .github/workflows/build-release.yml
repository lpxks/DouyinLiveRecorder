name: Build Multi-Platform Release

on:
  push:
    tags:
      - 'v*'               # Trigger on version tags like v4.0.8
  workflow_dispatch:        # Allow manual trigger from GitHub UI
    inputs:
      tag_name:
        description: 'Release tag name (e.g., v4.0.8)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  # ==========================================================================
  # Windows Build
  # ==========================================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      # --- Bundle FFmpeg for Windows ---
      - name: Download FFmpeg (Windows)
        shell: pwsh
        run: |
          $ffmpegUrl = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath .
          $ffmpegDir = Get-ChildItem -Directory -Filter "ffmpeg-*" | Select-Object -First 1
          Rename-Item $ffmpegDir.Name ffmpeg_bundle
          Remove-Item ffmpeg.zip

      # --- Bundle Node.js for Windows ---
      - name: Download Node.js (Windows)
        shell: pwsh
        run: |
          $nodeUrl = "https://nodejs.org/dist/v20.18.0/node-v20.18.0-win-x64.zip"
          Invoke-WebRequest -Uri $nodeUrl -OutFile node.zip
          Expand-Archive node.zip -DestinationPath .
          $nodeDir = Get-ChildItem -Directory -Filter "node-v*" | Select-Object -First 1
          Rename-Item $nodeDir.Name node
          Remove-Item node.zip

      - name: Build with PyInstaller
        run: pyinstaller DouyinLiveRecorder.spec

      # --- Assemble portable package ---
      - name: Assemble Windows package
        shell: pwsh
        run: |
          $distDir = "dist/DouyinLiveRecorder"

          # Copy FFmpeg and Node.js binaries next to the exe
          # (the app's ffmpeg_install.py checks ./ffmpeg/bin/ and ./node/)
          Copy-Item -Recurse ffmpeg_bundle/* $distDir/ffmpeg/ -ErrorAction SilentlyContinue
          # FFmpeg exe is usually in ffmpeg_bundle/bin/ — flatten it
          if (Test-Path "ffmpeg_bundle/bin/ffmpeg.exe") {
            New-Item -ItemType Directory -Force -Path "$distDir/ffmpeg/bin" | Out-Null
            Copy-Item ffmpeg_bundle/bin/* $distDir/ffmpeg/bin/ -Recurse
          }
          Copy-Item -Recurse node/* $distDir/node/ -ErrorAction SilentlyContinue

          # Generate default config files if missing
          if (-not (Test-Path "$distDir/config")) {
            New-Item -ItemType Directory -Force -Path "$distDir/config" | Out-Null
          }
          # Copy example config template (not user's actual config to avoid leaking secrets)
          Copy-Item config/config.ini $distDir/config/config.ini -ErrorAction SilentlyContinue
          # Create empty URL_config.ini
          "" | Out-File -FilePath "$distDir/config/URL_config.ini" -Encoding utf8

          # Create logs directory
          New-Item -ItemType Directory -Force -Path "$distDir/logs" | Out-Null

          # Package as zip
          Compress-Archive -Path $distDir/* -DestinationPath DouyinLiveRecorder_Windows_x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DouyinLiveRecorder_Windows_x64
          path: DouyinLiveRecorder_Windows_x64.zip

      - name: Upload to Release (if tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: DouyinLiveRecorder_Windows_x64.zip

  # ==========================================================================
  # macOS Build
  # ==========================================================================
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          brew install ffmpeg node@20
          # Link node if needed
          brew link --overwrite node@20 2>/dev/null || true

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller DouyinLiveRecorder.spec

      - name: Assemble macOS package
        run: |
          DISTDIR="dist/DouyinLiveRecorder"

          # Bundle ffmpeg binary
          mkdir -p "$DISTDIR/ffmpeg/bin"
          cp "$(which ffmpeg)" "$DISTDIR/ffmpeg/bin/"
          # Also copy dependent dylibs (otool-based)
          for lib in $(otool -L "$(which ffmpeg)" | grep -o '/usr/local/.*dylib' | head -10); do
            cp "$lib" "$DISTDIR/ffmpeg/bin/" 2>/dev/null || true
          done

          # Bundle node binary
          mkdir -p "$DISTDIR/node/bin"
          cp "$(which node)" "$DISTDIR/node/bin/"

          # Generate default config files
          mkdir -p "$DISTDIR/config" "$DISTDIR/logs"
          cp config/config.ini "$DISTDIR/config/config.ini" 2>/dev/null || true
          touch "$DISTDIR/config/URL_config.ini"

          # Package as tar.gz
          cd dist
          tar -czf ../DouyinLiveRecorder_macOS_arm64.tar.gz DouyinLiveRecorder/
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DouyinLiveRecorder_macOS_arm64
          path: DouyinLiveRecorder_macOS_arm64.tar.gz

      - name: Upload to Release (if tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: DouyinLiveRecorder_macOS_arm64.tar.gz

  # ==========================================================================
  # Linux Build
  # ==========================================================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          # Install Node.js 20.x
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          sudo apt-get install -y nodejs

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller DouyinLiveRecorder.spec

      - name: Assemble Linux package
        run: |
          DISTDIR="dist/DouyinLiveRecorder"

          # Bundle ffmpeg binary and its shared libs
          mkdir -p "$DISTDIR/ffmpeg/bin"
          cp "$(which ffmpeg)" "$DISTDIR/ffmpeg/bin/"
          # Copy required .so libraries
          for lib in $(ldd "$(which ffmpeg)" 2>/dev/null | grep -o '/lib/.*so[^ ]*' | head -10); do
            cp "$lib" "$DISTDIR/ffmpeg/bin/" 2>/dev/null || true
          done

          # Bundle node binary
          mkdir -p "$DISTDIR/node/bin"
          cp "$(which node)" "$DISTDIR/node/bin/"

          # Generate default config files
          mkdir -p "$DISTDIR/config" "$DISTDIR/logs"
          cp config/config.ini "$DISTDIR/config/config.ini" 2>/dev/null || true
          touch "$DISTDIR/config/URL_config.ini"

          # Package as tar.gz
          cd dist
          tar -czf ../DouyinLiveRecorder_Linux_x64.tar.gz DouyinLiveRecorder/
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DouyinLiveRecorder_Linux_x64
          path: DouyinLiveRecorder_Linux_x64.tar.gz

      - name: Upload to Release (if tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: DouyinLiveRecorder_Linux_x64.tar.gz
